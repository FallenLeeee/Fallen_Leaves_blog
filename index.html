<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallen_Leaves的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen" class="hide">
    <div id="loading-fill"></div>
    <div id="loading-percent">0</div>
  </div>

  <div id="bg-layer"></div>

  <div id="top-right-group">
    <span id="welcome-text">欢迎来到 Fallen_Leaves 的博客</span>
    <div id="toggle-btn" class="top-btn" title="切换背景图源">Bing 每日图</div>
    <div id="refresh-btn" class="top-btn" title="刷新Bing图片">↻</div>
  </div>

  <div id="poem-card">
    <p id="poem-text"></p>
    <p id="poem-origin"></p>
  </div>

  <div id="bottom-bar"></div>

  <script src="config/links.js"></script>
  <script src="js/bing.js"></script>
  <script src="js/poem.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
